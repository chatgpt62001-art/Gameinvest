<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>APEX CAPITAL – Investment Simulator</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0A0A0C;--panel:#111116;--card:#18181F;--border:rgba(201,168,76,0.18);
    --gold:#C9A84C;--gold-dim:rgba(201,168,76,0.14);--gold-glow:rgba(201,168,76,0.08);
    --text:#F0EDE6;--muted:#9B9589;--dim:#5C5852;
    --green:#4ADE80;--red:#F87171;
    --header-h:54px;--ticker-h:28px;
  }
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden}
  button{font-family:'DM Sans',sans-serif;cursor:pointer}
  input{font-family:'DM Mono',monospace}
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px}

  /* ── Layout ── */
  #app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

  header{
    background:rgba(10,10,12,0.97);border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 1.5rem;height:var(--header-h);flex-shrink:0;
    position:relative;z-index:50;backdrop-filter:blur(12px)
  }

  #ticker-bar{
    background:var(--panel);border-bottom:1px solid rgba(201,168,76,0.12);
    overflow:hidden;height:var(--ticker-h);flex-shrink:0;white-space:nowrap;
    display:flex;align-items:center
  }
  #ticker-inner{display:inline-flex;gap:2rem;animation:ticker 35s linear infinite}
  @keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}

  /* CRITICAL FIX: main area is a fixed-height flex row, sidebar never scrolls */
  #main{
    display:flex;flex:1;
    height:calc(100vh - var(--header-h) - var(--ticker-h));
    overflow:hidden
  }

  nav#sidenav{
    width:70px;background:var(--panel);border-right:1px solid var(--border);
    display:flex;flex-direction:column;align-items:center;padding:1rem 0;gap:4px;
    flex-shrink:0;height:100%;overflow-y:auto
  }
  nav#sidenav button{
    width:52px;height:52px;border-radius:12px;border:1px solid transparent;
    background:none;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:3px;color:var(--dim);
    font-size:9px;letter-spacing:.06em;text-transform:uppercase
  }
  nav#sidenav button.active{border-color:rgba(201,168,76,.5);background:rgba(201,168,76,.1);color:var(--gold)}
  nav#sidenav button:hover:not(.active){background:rgba(201,168,76,.05);color:var(--muted)}
  nav#sidenav button span.nav-icon{font-size:18px}

  #content{flex:1;overflow-y:auto;padding:1.5rem;height:100%}

  /* ── Cards ── */
  .asset-card{
    background:var(--panel);border:1px solid var(--gold-dim);border-radius:14px;
    padding:14px 14px 10px;cursor:pointer;position:relative;
    display:flex;flex-direction:column;gap:4px
  }
  .asset-card:hover{border-color:rgba(201,168,76,.5);transform:translateY(-1px)}
  .asset-card.owned{border-color:rgba(201,168,76,.45)}
  .owned-badge{
    position:absolute;top:8px;right:8px;background:rgba(201,168,76,.15);
    border:1px solid rgba(201,168,76,.4);color:var(--gold);font-size:10px;
    padding:2px 7px;border-radius:20px;font-weight:600
  }

  /* Car thumbnail in card */
  .card-car-img{
    width:100%;height:90px;border-radius:8px;overflow:hidden;
    background:var(--card);margin-bottom:4px;position:relative
  }
  .card-car-img img{width:100%;height:100%;object-fit:cover;display:block}
  .card-car-img .car-fallback-sm{
    position:absolute;inset:0;display:flex;align-items:center;
    justify-content:center;font-size:36px;background:var(--card)
  }

  /* Watch thumbnail in card */
  .card-watch-img{
    width:64px;height:64px;border-radius:8px;overflow:hidden;
    background:var(--card);flex-shrink:0;position:relative
  }
  .card-watch-img img{width:100%;height:100%;object-fit:contain;padding:4px}
  .card-watch-fallback{
    position:absolute;inset:0;display:flex;align-items:center;
    justify-content:center;font-size:28px
  }

  .card-name{font-size:13px;font-weight:600;color:var(--text);margin-top:2px}
  .card-ticker{font-size:10px;color:var(--dim);letter-spacing:.1em;font-family:'DM Mono',monospace}
  .card-price{font-size:15px;font-weight:700;color:var(--gold);font-family:'DM Mono',monospace;margin-top:2px}
  .card-chg{font-size:11px;font-weight:600;padding:2px 7px;border-radius:5px}
  .card-chg.up{background:rgba(74,222,128,.13);color:var(--green)}
  .card-chg.dn{background:rgba(248,113,113,.13);color:var(--red)}
  .card-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
  .card-top-row{display:flex;align-items:center;gap:8px}

  /* Brand image */
  .brand-img-wrap{
    width:40px;height:40px;border-radius:8px;overflow:hidden;background:var(--card);
    display:flex;align-items:center;justify-content:center;flex-shrink:0
  }
  .brand-img-wrap img{width:36px;height:36px;object-fit:contain}

  /* Grid */
  .grid-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
  .grid-upgrades{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}

  /* Upgrade card */
  .upgrade-card{background:var(--panel);border:1px solid var(--gold-dim);border-radius:16px;padding:1.25rem}
  .upgrade-card.owned{border-color:rgba(201,168,76,.5);background:rgba(201,168,76,.03)}
  .upgrade-icon{font-size:32px;margin-bottom:8px}
  .upgrade-name{font-size:15px;font-weight:700;margin-bottom:6px}
  .upgrade-desc{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:8px}
  .upgrade-mechanic{
    font-size:11px;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);
    border-radius:8px;padding:8px 10px;margin-bottom:10px;color:#d4b86a;line-height:1.6
  }
  .upgrade-effect{
    font-size:11px;color:var(--green);background:rgba(74,222,128,.08);
    padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:12px
  }

  /* Section headers */
  .section-title{
    font-family:'Playfair Display',serif;font-size:24px;font-weight:900;
    letter-spacing:.08em;color:var(--gold);margin-bottom:4px
  }
  .section-sub{font-size:10px;color:var(--dim);letter-spacing:.15em;text-transform:uppercase;margin-bottom:1rem}

  /* Filters */
  .filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
  .filter-bar input{
    background:var(--card);border:1px solid rgba(201,168,76,.2);border-radius:10px;
    padding:6px 14px;color:var(--text);font-size:13px;outline:none;width:200px
  }
  .filter-btn{
    padding:5px 14px;border-radius:20px;border:1px solid rgba(201,168,76,.14);
    background:none;color:var(--dim);font-size:12px;cursor:pointer;
  }
  .filter-btn.active{border-color:rgba(201,168,76,.5);background:rgba(201,168,76,.1);color:var(--gold)}

  /* Modal */
  #modal-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;
    display:none;align-items:center;justify-content:center;padding:1rem
  }
  #modal-overlay.open{display:flex}
  #modal-box{
    background:var(--panel);border:1px solid rgba(201,168,76,.35);border-radius:20px;
    width:min(640px,96vw);max-height:92vh;overflow-y:auto;position:relative
  }
  #modal-inner{padding:1.5rem;display:flex;flex-direction:column;gap:1rem}
  #modal-close{
    position:sticky;top:12px;float:right;margin:12px 12px 0 0;
    background:var(--card);border:1px solid rgba(201,168,76,.3);color:var(--muted);
    border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:16px;
    display:flex;align-items:center;justify-content:center;z-index:10;flex-shrink:0
  }

  /* Car image in modal */
  .car-visual{background:var(--card);border-radius:12px;overflow:hidden;position:relative}
  .car-visual img{width:100%;height:210px;object-fit:cover;display:block}
  .car-visual .car-model-label{font-size:11px;color:var(--dim);padding:8px 12px;text-align:center}
  .car-fallback{width:100%;height:200px;display:flex;align-items:center;justify-content:center;font-size:64px}

  /* Watch visual */
  .watch-visual{
    background:var(--card);border-radius:12px;padding:1rem;
    display:flex;align-items:center;justify-content:center;gap:2rem
  }
  .watch-img-box{
    background:#111;border-radius:12px;overflow:hidden;
    display:flex;align-items:center;justify-content:center;padding:12px;
    width:150px;height:150px;flex-shrink:0
  }
  .watch-img-box img{width:126px;height:126px;object-fit:contain}

  /* Stats */
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .stat-box{background:var(--card);border-radius:10px;padding:.7rem;text-align:center}
  .stat-label{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);margin-bottom:4px}
  .stat-val{font-size:15px;font-family:'DM Mono',monospace;color:var(--text);font-weight:600}

  /* Trade */
  .trade-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .trade-box{background:var(--card);border-radius:12px;padding:1rem}
  .trade-box.buy{border:1px solid rgba(74,222,128,.15)}
  .trade-box.sell{border:1px solid rgba(248,113,113,.15)}
  .trade-label{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);margin-bottom:10px}
  .trade-qty{display:flex;align-items:center;gap:6px;margin-bottom:8px}
  .trade-qty button{width:30px;height:30px;border-radius:8px;font-size:16px;display:flex;align-items:center;justify-content:center}
  .trade-qty input{width:56px;text-align:center;background:#22222C;border-radius:8px;color:var(--text);font-size:14px;padding:4px;outline:none}
  .trade-total{font-size:11px;color:var(--muted);margin-bottom:10px}
  .btn-buy{width:100%;padding:.6rem;border-radius:10px;border:1px solid rgba(74,222,128,.35);background:rgba(74,222,128,.12);color:var(--green);font-weight:700;font-size:13px}
  .btn-buy:disabled{opacity:.35;cursor:not-allowed}
  .btn-sell{width:100%;padding:.6rem;border-radius:10px;border:1px solid rgba(248,113,113,.3);background:rgba(248,113,113,.1);color:var(--red);font-weight:700;font-size:13px}
  .btn-sell:disabled{opacity:.35;cursor:not-allowed}
  .btn-upgrade{width:100%;padding:.55rem;border-radius:10px;border:1px solid rgba(201,168,76,.4);background:rgba(201,168,76,.1);color:var(--gold);font-weight:700;font-size:13px}
  .btn-upgrade:disabled{opacity:.35;cursor:not-allowed}

  /* Color picker */
  .color-dot{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,.15)}
  .color-dot.selected{border:3px solid var(--gold);transform:scale(1.2)}

  /* Portfolio table */
  .port-table{width:100%;border-collapse:collapse;font-size:13px}
  .port-table th{text-align:left;padding:8px 10px;font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);font-weight:500;border-bottom:1px solid rgba(201,168,76,.15)}
  .port-table td{padding:10px;border-bottom:1px solid rgba(201,168,76,.06)}
  .port-table tr:hover td{background:var(--card)}
  .port-table tr{cursor:pointer;}

  /* KPI */
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem}
  .kpi-card{background:var(--panel);border:1px solid var(--gold-dim);border-radius:14px;padding:1rem 1.25rem}
  .kpi-label{font-size:9px;text-transform:uppercase;letter-spacing:.14em;color:var(--dim);margin-bottom:6px}
  .kpi-val{font-size:20px;font-family:'DM Mono',monospace;font-weight:700}

  /* Notification */
  #notif{position:fixed;bottom:2rem;right:2rem;background:var(--panel);border-radius:14px;padding:.9rem 1.25rem;min-width:260px;z-index:300;display:none;animation:slideIn .3s ease}
  @keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
  #notif.success{border:1px solid rgba(74,222,128,.4)}
  #notif.error{border:1px solid rgba(248,113,113,.4)}
  #notif-title{font-weight:700;margin-bottom:3px}
  #notif-body{font-size:12px;color:var(--muted)}

  .pack-btns{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
  .pack-btn{padding:3px 9px;border-radius:6px;border:1px solid rgba(201,168,76,.2);background:var(--card);color:var(--muted);font-size:11px;cursor:pointer;font-weight:600;font-family:'DM Mono',monospace}
  .pack-btn:hover{border-color:rgba(201,168,76,.5);color:var(--gold)}
  .pack-btn.pack-active{border-color:rgba(201,168,76,.7);background:rgba(201,168,76,.15);color:var(--gold)}
  .pack-btn-buy.pack-active{border-color:rgba(74,222,128,.5);background:rgba(74,222,128,.1);color:var(--green)}
  .pack-btn-sell.pack-active{border-color:rgba(248,113,113,.4);background:rgba(248,113,113,.08);color:var(--red)}
  .price-line{display:flex;align-items:center;justify-content:space-between}
  .price-big{font-size:26px;font-weight:700;color:var(--gold);font-family:'DM Mono',monospace}
  .sparkline-wrap{background:var(--card);border-radius:10px;padding:8px 12px}
  .pnl-box{background:var(--card);border-radius:10px;padding:.75rem;display:flex;gap:1.5rem;justify-content:center}
  .empty{color:var(--dim);text-align:center;padding:3rem;font-size:14px}
  .news-item{padding:.85rem 0;border-bottom:1px solid rgba(201,168,76,.08)}
  .news-time{font-size:10px;font-family:'DM Mono',monospace;color:var(--dim);margin-bottom:4px}
  .news-text{font-size:13px;color:var(--muted);line-height:1.6}
  .news-text b{color:var(--text)}
  .apex-logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;letter-spacing:.15em;color:var(--gold)}
  .apex-sub{font-size:9px;color:var(--dim);letter-spacing:.2em;text-transform:uppercase;margin-top:-3px}
  .hstat{text-align:right}
  .hstat-label{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--dim)}
  .hstat-val{font-size:13px;font-family:'DM Mono',monospace;font-weight:700}

  /* ── INTRO SCREEN ── */
  #intro-overlay{
    position:fixed;inset:0;z-index:999;
    background:radial-gradient(ellipse at 50% 30%,#1a1508 0%,#0A0A0C 70%);
    display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:0;
  }
  #intro-overlay.fade-out{opacity:0;pointer-events:none}

  .intro-particles{display:none}

  .intro-logo-wrap{text-align:center;margin-bottom:2.5rem}

  .intro-logo{
    font-family:'Playfair Display',serif;font-size:clamp(40px,8vw,72px);
    font-weight:900;letter-spacing:.2em;
    background:linear-gradient(135deg,#C9A84C 0%,#f5d680 45%,#C9A84C 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    line-height:1
  }
  .intro-tagline{font-size:11px;letter-spacing:.35em;text-transform:uppercase;color:var(--dim);margin-top:8px}

  .intro-card{
    background:rgba(17,17,22,.95);
    border:1px solid rgba(201,168,76,.25);
    border-radius:24px;padding:2.5rem 3rem;
    width:min(480px,92vw);
    box-shadow:0 40px 80px rgba(0,0,0,.6);
  }
  .intro-card h2{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--gold);margin-bottom:6px}
  .intro-card p{font-size:13px;color:var(--muted);margin-bottom:1.5rem;line-height:1.6}

  .capital-presets{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
  .cap-btn{
    flex:1;min-width:80px;padding:10px 6px;border-radius:12px;
    border:1px solid rgba(201,168,76,.2);background:var(--card);
    color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;
    font-family:'DM Mono',monospace;text-align:center
  }
  .cap-btn:hover{border-color:rgba(201,168,76,.5);color:var(--gold)}
  .cap-btn.selected{border-color:var(--gold);background:rgba(201,168,76,.12);color:var(--gold)}

  .intro-custom-wrap{margin-bottom:1.5rem}
  .intro-custom-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
  .intro-custom-input{
    width:100%;background:var(--card);border:1px solid rgba(201,168,76,.2);
    border-radius:12px;padding:10px 14px;color:var(--text);font-size:16px;
    font-family:'DM Mono',monospace;outline:none
  }
  .intro-custom-input:focus{border-color:rgba(201,168,76,.5)}

  .intro-start-btn{
    width:100%;padding:14px;border-radius:14px;
    background:linear-gradient(135deg,#C9A84C,#a8832a);
    border:none;color:#0A0A0C;font-size:15px;font-weight:800;
    letter-spacing:.1em;cursor:pointer;
    text-transform:uppercase;font-family:'DM Sans',sans-serif
  }
  .intro-start-btn:hover{opacity:.9}

  /* ── CHART RANGE CONTROLS ── */
  .chart-range-bar{display:flex;gap:4px;align-items:center;margin-bottom:4px}
  .range-btn{
    padding:3px 10px;border-radius:6px;border:1px solid rgba(201,168,76,.15);
    background:none;color:var(--dim);font-size:11px;font-family:'DM Mono',monospace;
    cursor:pointer;font-weight:600
  }
  .range-btn:hover{border-color:rgba(201,168,76,.4);color:var(--muted)}
  .range-btn.active{border-color:rgba(201,168,76,.6);background:rgba(201,168,76,.12);color:var(--gold)}

  /* modal chart */
  .modal-chart-wrap{background:var(--card);border-radius:12px;padding:12px 16px;display:flex;flex-direction:column;gap:6px}
  .spark-gradient{display:block}

  /* asset card hover — border only, no transform */
  .asset-card:hover{border-color:rgba(201,168,76,.55)}
  .asset-card.owned{border-color:rgba(201,168,76,.5)}

  /* KPI card */
  .kpi-card{background:linear-gradient(135deg,var(--panel) 0%,rgba(201,168,76,.03) 100%)}
</style>
</head>
<body>
<!-- ── INTRO SCREEN ── -->
<div id="intro-overlay">
  <div class="intro-particles" id="intro-particles"></div>
  <div class="intro-logo-wrap">
    <div class="intro-logo">APEX CAPITAL</div>
    <div class="intro-tagline">Investment Simulator · Premium Edition</div>
  </div>
  <div class="intro-card">
    <h2>Startkapital wählen</h2>
    <p>Wähle dein Anfangskapital oder gib einen eigenen Betrag ein. Dein Ziel: maximale Rendite.</p>
    <div class="capital-presets">
      <div class="cap-btn selected" onclick="selectCap(this,100000)">$100K</div>
      <div class="cap-btn" onclick="selectCap(this,500000)">$500K</div>
      <div class="cap-btn" onclick="selectCap(this,1000000)">$1M</div>
      <div class="cap-btn" onclick="selectCap(this,5000000)">$5M</div>
      <div class="cap-btn" onclick="selectCap(this,10000000)">$10M</div>
    </div>
    <div class="intro-custom-wrap">
      <div class="intro-custom-label">Eigener Betrag (USD)</div>
      <input class="intro-custom-input" id="custom-capital" type="number" min="1000" step="1000"
        placeholder="z.B. 250.000" oninput="onCustomCapInput(+this.value)"/>
    </div>
    <button class="intro-start-btn" onclick="startGame()">HANDELN BEGINNEN →</button>
  </div>
</div>

<div id="app" style="display:none">
  <header>
    <div>
      <div class="apex-logo">APEX CAPITAL</div>
      <div class="apex-sub">Investment Simulator</div>
    </div>
    <div style="display:flex;gap:1.5rem;align-items:center">
      <div class="hstat"><div class="hstat-label">Datum</div><div class="hstat-val" id="h-date" style="color:var(--muted)">—</div></div>
      <div class="hstat"><div class="hstat-label">Kapital</div><div class="hstat-val" id="h-cash" style="color:var(--gold)">—</div></div>
      <div class="hstat"><div class="hstat-label">Portfolio</div><div class="hstat-val" id="h-port" style="color:var(--gold)">—</div></div>
      <div class="hstat"><div class="hstat-label">P/L</div><div class="hstat-val" id="h-pnl">—</div></div>
    </div>
  </header>

  <div id="ticker-bar"><div id="ticker-inner"></div></div>

  <div id="main">
    <nav id="sidenav">
      <button class="active" onclick="setPanel('dashboard')"><span class="nav-icon">⊞</span>Depot</button>
      <button onclick="setPanel('stocks')"><span class="nav-icon">📈</span>Aktien</button>
      <button onclick="setPanel('cars')"><span class="nav-icon">🏎</span>Autos</button>
      <button onclick="setPanel('watches')"><span class="nav-icon">⌚</span>Uhren</button>
      <button onclick="setPanel('assets')"><span class="nav-icon">💎</span>Assets</button>
      <button onclick="setPanel('upgrades')"><span class="nav-icon">⭐</span>Upgrades</button>

// UTILS
// ═══════════════════════════════════════════════════════════════
function fmtDate(d){return d.toLocaleDateString("de-DE",{day:"2-digit",month:"short",year:"numeric"});}
function fmt(n){
  if(n===undefined||n===null)return"—";
  if(n>=1e6)return"$"+(n/1e6).toFixed(2)+"M";
  if(n>=1000)return"$"+Math.round(n).toLocaleString("de-DE");
  return"$"+n.toFixed(2);
}
function fmtPct(n){return(n>=0?"+":"")+n.toFixed(2)+"%";}
function portValue(){
  return Object.entries(GS.portfolio).reduce((s,[id,p])=>s+(GS.prices[id]||0)*p.qty,0);
}
function totalPnL(){return GS.cash+portValue()-(GS.startCash||500000);}
function getChange(id){
  const h=GS.history[id];
  if(!h||h.length<2)return 0;
  const prev=h[Math.max(0,h.length-12)];
  return((GS.prices[id]-prev)/prev)*100;
}
function sparklineSVG(data,color,w=80,h=28,fill=false){
  if(!data||data.length<2)return"";
  const min=Math.min(...data),max=Math.max(...data),range=max-min||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1)*w).toFixed(1)},${(h-((v-min)/range)*(h-2)).toFixed(1)}`).join(" ");
  if(fill){
    const id="sg"+Math.random().toString(36).slice(2,7);
    const xN=w.toString();
    return`<svg class="spark-gradient" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
      <defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.2"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0.01"/>
      </linearGradient></defs>
      <polygon points="0,${h} ${pts} ${xN},${h}" fill="url(#${id})"/>
      <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
    </svg>`;
  }
  return`<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/></svg>`;
}

function brandLogoHTML(key,size=40){
  const url=BRAND_LOGOS[key];
  const abbr=((key||"?").replace(/[^A-Z0-9]/gi,"").slice(0,3)||"?").toUpperCase();
  const fs=Math.floor(size*.32);
  const fallbackStyle=`font-size:${fs}px;color:var(--gold);font-weight:700;letter-spacing:-.02em`;
  const wrapStyle=`width:${size}px;height:${size}px;background:var(--card);border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0`;
  if(url){
    // Use object-fit:contain so logos don't get cropped; white-ish logos on transparent bg need a dark bg
    const imgStyle=`width:${size-4}px;height:${size-4}px;object-fit:contain`;
    return`<div style="${wrapStyle}"><img src="${url}" alt="${key}" loading="lazy" style="${imgStyle}" onerror="this.outerHTML='<span style=\\'${fallbackStyle}\\'>${abbr}</span>'"/></div>`;
  }
  return`<div style="${wrapStyle}"><span style="${fallbackStyle}">${abbr}</span></div>`;
}

function buy(assetId,qty){
  const asset=ALL_ASSETS.find(a=>a.id===assetId);if(!asset)return;
  const price=GS.prices[assetId],cost=price*qty;
  if(cost>GS.cash){showNotif("Kein Kapital ✗","Nur "+fmt(GS.cash)+" verfügbar",false);return;}
  const port={...GS.portfolio};
  if(!port[assetId])port[assetId]={qty:0,avgCost:0};
  const old=port[assetId];
  port[assetId]={qty:old.qty+qty,avgCost:(old.avgCost*old.qty+cost)/(old.qty+qty)};
  GS={...GS,cash:GS.cash-cost,portfolio:port};
  showNotif("Gekauft ✓",`${qty}× ${asset.name} für ${fmt(cost)}`,true);
  updateHeader();
  if(currentPanel!=="dashboard")renderPanelInPlace();
  if(currentModal)updateModalInPlace();
}
function sell(assetId,qty){
  const asset=ALL_ASSETS.find(a=>a.id===assetId);if(!asset)return;
  const pos=GS.portfolio[assetId];
  if(!pos||pos.qty<qty){showNotif("Kein Bestand ✗","Nicht genug im Portfolio",false);return;}
  const price=GS.prices[assetId],income=price*qty;
  const hasTax=!GS.upgrades["taxopt"];
  const gain=(price-pos.avgCost)*qty;
  const tax=(hasTax&&gain>0)?gain*0.30:0;
  const net=income-tax;
  const port={...GS.portfolio};
  const newQty=port[assetId].qty-qty;
  if(newQty<=0)delete port[assetId];
  else port[assetId]={...port[assetId],qty:newQty};
  GS={...GS,cash:GS.cash+net,portfolio:port};
  const taxNote=tax>0?` (${fmt(tax)} Steuer)`:""
  showNotif("Verkauft ✓",`${qty}× ${asset.name} für ${fmt(net)}${taxNote}`,true);
  sellQty=1;
  updateHeader();
  if(currentPanel!=="dashboard")renderPanelInPlace();
  if(currentModal)updateModalInPlace();
}
function renderPanelInPlace(){
  // lightweight re-render of just the content area, preserving scroll position
  const el=document.getElementById("content");
  const scrollTop=el.scrollTop;
  render();
  el.scrollTop=scrollTop;
}
function updateModalInPlace(){
  if(!currentModal)return;
  const {asset,type}=currentModal;
  const price=GS.prices[asset.id];
  const owned=GS.portfolio[asset.id];
  const maxBuy=Math.floor(GS.cash/price);
  const maxSell=owned?owned.qty:0;
  // clamp quantities to valid ranges
  buyQty=Math.max(1,Math.min(buyQty,maxBuy||1));
  sellQty=Math.max(1,Math.min(sellQty,maxSell||1));
  // update buy side
  const bqi=document.getElementById("buy-qty-in");
  const bt=document.getElementById("buy-total");
  const btnBuy=document.getElementById("modal-btn-buy");
  const bMax=document.getElementById("buy-max-val");
  if(bqi)bqi.value=buyQty;
  if(bt)bt.textContent="Gesamt: "+fmt(price*buyQty);
  if(btnBuy)btnBuy.disabled=(price*buyQty>GS.cash);
  if(bMax)bMax.textContent="MAX "+maxBuy+"×";
  // update sell side
  const sqi=document.getElementById("sell-qty-in");
  const st=document.getElementById("sell-total");
  const btnSell=document.getElementById("modal-btn-sell");
  const sMax=document.getElementById("sell-max-val");
  if(sqi)sqi.value=sellQty;
  if(st)st.textContent="Erlös: "+fmt(price*sellQty);
  if(btnSell)btnSell.disabled=(!owned||owned.qty<sellQty);
  if(sMax)sMax.textContent="MAX "+maxSell+"×";
  // update owned stats
  const ownedEl=document.getElementById("modal-owned-qty");
  const buyPowerEl=document.getElementById("modal-buy-power");
  if(ownedEl)ownedEl.textContent=(owned?owned.qty+"×":"0×");
  if(buyPowerEl)buyPowerEl.textContent=maxBuy+"×";
  // update PnL box
  const pnlBox=document.getElementById("modal-pnl-box");
  if(pnlBox){
    if(owned){
      pnlBox.innerHTML=`
        <div style="text-align:center"><div style="font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em">Kaufkurs Ø</div><div style="font-size:14px;font-family:'DM Mono',monospace;color:var(--text)">${fmt(owned.avgCost)}</div></div>
        <div style="text-align:center"><div style="font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em">Unrealisiert P/L</div><div style="font-size:14px;font-family:'DM Mono',monospace;color:${price>owned.avgCost?"var(--green)":"var(--red)"}">
          ${fmt((price-owned.avgCost)*owned.qty)} (${fmtPct(((price-owned.avgCost)/owned.avgCost)*100)})</div></div>`;
      pnlBox.style.display="flex";
    } else {
      pnlBox.style.display="none";
    }
  }
}
function setPackQty(side,qty){
  if(!currentModal)return;
  const price=GS.prices[currentModal.asset.id];
  const owned=GS.portfolio[currentModal.asset.id];
  if(side==="buy"){
    const maxBuy=Math.floor(GS.cash/price);
    buyQty=qty==="max"?Math.max(1,maxBuy):Math.max(1,Math.min(qty,maxBuy));
  } else {
    const maxSell=owned?owned.qty:0;
    sellQty=qty==="max"?Math.max(1,maxSell):Math.max(1,Math.min(qty,maxSell));
  }
  updateModalInPlace();
  // highlight active pack button
  document.querySelectorAll(`.pack-btn-${side}`).forEach(b=>b.classList.remove("pack-active"));
  const key=qty==="max"?"max":qty;
  const activeBtn=document.getElementById(`pack-${side}-${key}`);
  if(activeBtn)activeBtn.classList.add("pack-active");
}
function buyUpgrade(id){
  const u=UPGRADES_DATA.find(x=>x.id===id);
  if(!u||GS.upgrades[id])return;
  if(GS.cash<u.cost){showNotif("Kein Kapital ✗","Benötige "+fmt(u.cost),false);return;}
  GS={...GS,cash:GS.cash-u.cost,upgrades:{...GS.upgrades,[id]:true}};
  showNotif("Upgrade aktiv ✓",u.name+" freigeschaltet",true);
  render();
}

// ═══════════════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════════════
function openModal(assetId,type){
  const asset=ALL_ASSETS.find(a=>a.id===assetId);
  if(!asset)return;
  buyQty=1;sellQty=1;
  if(type==="car")selectedColor=CAR_COLORS.find(c=>c.hex===GS.carColors[assetId])||CAR_COLORS[0];
  else if(type==="watch")selectedColor=WATCH_COLORS.find(c=>c.hex===GS.watchColors[assetId])||WATCH_COLORS[0];
  else selectedColor=null;
  currentModal={asset,type};
  document.getElementById("modal-overlay").classList.add("open");
  renderModal();
}
function closeModal(){
  document.getElementById("modal-overlay").classList.remove("open");
  currentModal=null;
}
function renderModal(){
  if(!currentModal)return;
  const {asset,type}=currentModal;
  const price=GS.prices[asset.id];
  const chg=getChange(asset.id);
  const up=chg>=0;
  const owned=GS.portfolio[asset.id];
  const hist=GS.history[asset.id]||[price];
  const maxBuy=Math.floor(GS.cash/price);
  const maxSell=owned?owned.qty:0;
  const isCar=type==="car";
  const isWatch=type==="watch";
  const colList=isCar?CAR_COLORS:isWatch?WATCH_COLORS:null;
  const selCol=selectedColor?.hex||"#CC0000";

  // clamp
  buyQty=Math.max(1,Math.min(buyQty,maxBuy||1));
  sellQty=Math.max(1,Math.min(sellQty,maxSell||1));

  let visualHTML="";
  if(isCar){
    visualHTML=`<div class="car-visual" style="border-bottom:4px solid ${selCol}">
      <div style="display:flex;align-items:center;justify-content:center;padding:1.5rem;gap:1.5rem">
        ${brandLogoHTML(asset.brand,72)}
        <div>
          <div style="font-size:13px;color:var(--dim);margin-bottom:4px">${asset.brand}</div>
          <div style="font-size:20px;font-weight:700;color:var(--text)">${asset.model}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:6px">${asset.desc}</div>
        </div>
      </div>
      <div class="car-model-label">${asset.brand} · ${asset.model}</div>
    </div>`;
  } else if(isWatch){
    const rawUrl=WATCH_IMAGES[asset.id];
    const imgUrl=rawUrl?proxyImgWatch(rawUrl):null;
    const logoKey=asset.logoKey||asset.brand;
    visualHTML=`<div class="watch-visual">
      <div class="watch-img-box">
        ${imgUrl
          ?`<img src="${imgUrl}" alt="${asset.name}" loading="lazy" onerror="this.style.display='none';this.parentNode.innerHTML='<div style=font-size:48px>⌚</div>'"/>`
          :`<div style="font-size:48px">⌚</div>`}
      </div>
      <div>
        ${brandLogoHTML(logoKey,44)}
        <div style="font-size:12px;color:var(--dim);margin:8px 0 4px">${asset.brand}</div>
        <div style="font-size:15px;color:var(--text);font-weight:700;margin-bottom:4px">${asset.model}</div>
        <div style="font-size:12px;color:var(--muted)">${asset.desc}</div>
      </div>
    </div>`;
  } else {
    const logoKey=asset.logoKey||asset.brand||asset.logo;
    const iconOrLogo = logoKey ? brandLogoHTML(logoKey,56) :
      `<div style="width:56px;height:56px;border-radius:12px;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:32px">${asset.icon||"💎"}</div>`;
    visualHTML=`<div style="display:flex;align-items:center;gap:1rem;background:var(--card);border-radius:12px;padding:1rem">
      ${iconOrLogo}
      <div>
        <div style="font-size:11px;color:var(--dim)">${asset.ticker}</div>
        <div style="font-size:18px;font-weight:700;color:var(--text)">${asset.name}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">${asset.desc}</div>
      </div>
    </div>`;
  }

  let colorHTML="";
  if(colList){
    colorHTML=`<div>
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);margin-bottom:8px">${isCar?"Lackierung":"Armband & Zifferblatt"}</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        ${colList.map(c=>`<div class="color-dot${selectedColor?.hex===c.hex?" selected":""}" style="background:${c.hex};${c.hex==="#F5F5F5"?"box-shadow:inset 0 0 0 1px #999":""}" title="${c.name}" onclick="pickColor('${asset.id}','${c.hex}','${c.name}','${isCar?"car":"watch"}')"></div>`).join("")}
      </div>
      ${selectedColor?`<div style="font-size:11px;color:var(--muted);margin-top:6px">${selectedColor.name}</div>`:""}
    </div>`;
  }

  const packBtnsBuy=`<div class="pack-btns">${[1,5,10,100].map(n=>`<button id="pack-buy-${n}" class="pack-btn pack-btn-buy${buyQty===n?" pack-active":""}" onclick="setPackQty('buy',${n})">${n}×</button>`).join("")}<button id="pack-buy-max" class="pack-btn pack-btn-buy${buyQty===maxBuy?" pack-active":""}" onclick="setPackQty('buy','max')"><span id="buy-max-val">MAX ${maxBuy}×</span></button></div>`;
  const packBtnsSell=`<div class="pack-btns">${[1,5,10,100].map(n=>`<button id="pack-sell-${n}" class="pack-btn pack-btn-sell${sellQty===n?" pack-active":""}" onclick="setPackQty('sell',${n})">${n}×</button>`).join("")}<button id="pack-sell-max" class="pack-btn pack-btn-sell${sellQty===maxSell&&maxSell>0?" pack-active":""}" onclick="setPackQty('sell','max')"><span id="sell-max-val">MAX ${maxSell}×</span></button></div>`;

  document.getElementById("modal-inner").innerHTML=`
    ${visualHTML}
    <div class="modal-chart-wrap">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <div>
          <div class="price-big">${fmt(price)}</div>
          <span style="font-size:13px;font-weight:600;padding:3px 8px;border-radius:6px;background:${up?"rgba(74,222,128,.13)":"rgba(248,113,113,.13)"};color:${up?"var(--green)":"var(--red)"}">
            ${up?"▲":"▼"} ${Math.abs(chg).toFixed(2)}%
          </span>
        </div>
        <div class="chart-range-bar">
          ${[[10,"1W"],[20,"1M"],[60,"3M"],[120,"6M"],[200,"MAX"]].map(([t,l])=>
            `<button class="range-btn${chartRange===t?" active":""}" onclick="setChartRange(${t})">${l}</button>`
          ).join("")}
        </div>
      </div>
      ${sparklineSVG(hist.slice(-chartRange),up?"var(--green)":"var(--red)",560,72,true)}
    </div>
    ${colorHTML}
    <div class="stats-row">
      <div class="stat-box"><div class="stat-label">Im Besitz</div><div class="stat-val" id="modal-owned-qty">${owned?owned.qty+"×":"0×"}</div></div>
      <div class="stat-box"><div class="stat-label">Kaufkraft</div><div class="stat-val" id="modal-buy-power">${maxBuy}×</div></div>
      <div class="stat-box"><div class="stat-label">Volatilität</div><div class="stat-val">${(asset.vol*100).toFixed(1)}%</div></div>
    </div>
    <div class="trade-grid">
      <div class="trade-box buy">
        <div class="trade-label">Kaufen</div>
        ${packBtnsBuy}
        <div class="trade-qty">
          <button style="border:1px solid rgba(74,222,128,.3);background:#22222C;color:var(--green);border-radius:8px" onclick="adjQty('buy',-1)">−</button>
          <input type="number" min="1" value="${buyQty}" id="buy-qty-in" onchange="buyQty=Math.max(1,parseInt(this.value)||1);updateModalInPlace()" style="border:1px solid rgba(74,222,128,.3)"/>
          <button style="border:1px solid rgba(74,222,128,.3);background:#22222C;color:var(--green);border-radius:8px" onclick="adjQty('buy',1)">+</button>
        </div>
        <div class="trade-total" id="buy-total">Gesamt: ${fmt(price*buyQty)}</div>
        <button id="modal-btn-buy" class="btn-buy" ${price*buyQty>GS.cash?"disabled":""} onclick="buy('${asset.id}',buyQty)">KAUFEN</button>
      </div>
      <div class="trade-box sell">
        <div class="trade-label">Verkaufen</div>
        ${packBtnsSell}
        <div class="trade-qty">
          <button style="border:1px solid rgba(248,113,113,.25);background:#22222C;color:var(--red);border-radius:8px" onclick="adjQty('sell',-1)">−</button>
          <input type="number" min="1" value="${sellQty}" id="sell-qty-in" onchange="sellQty=Math.max(1,parseInt(this.value)||1);updateModalInPlace()" style="border:1px solid rgba(248,113,113,.25)"/>
          <button style="border:1px solid rgba(248,113,113,.25);background:#22222C;color:var(--red);border-radius:8px" onclick="adjQty('sell',1)">+</button>
        </div>
        <div class="trade-total" id="sell-total">Erlös: ${fmt(price*sellQty)}</div>
        <button id="modal-btn-sell" class="btn-sell" ${!owned||owned.qty<sellQty?"disabled":""} onclick="sell('${asset.id}',sellQty)">VERKAUFEN</button>
      </div>
    </div>
    <div class="pnl-box" id="modal-pnl-box" style="display:${owned?"flex":"none"}">
      ${owned?`
      <div style="text-align:center"><div style="font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em">Kaufkurs Ø</div><div style="font-size:14px;font-family:'DM Mono',monospace;color:var(--text)">${fmt(owned.avgCost)}</div></div>
      <div style="text-align:center"><div style="font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em">Unrealisiert P/L</div><div style="font-size:14px;font-family:'DM Mono',monospace;color:${price>owned.avgCost?"var(--green)":"var(--red)"}">
        ${fmt((price-owned.avgCost)*owned.qty)} (${fmtPct(((price-owned.avgCost)/owned.avgCost)*100)})</div></div>`:""}
    </div>
  `;
}


function adjQty(side,delta){
  if(!currentModal)return;
  const price=GS.prices[currentModal.asset.id];
  const owned=GS.portfolio[currentModal.asset.id];
  if(side==="buy"){
    const maxBuy=Math.floor(GS.cash/price);
    buyQty=Math.max(1,Math.min(buyQty+delta,maxBuy||1));
  } else {
    const maxSell=owned?owned.qty:0;
    sellQty=Math.max(1,Math.min(sellQty+delta,maxSell||1));
  }
  updateModalInPlace();
}
function updateTradeDisplay(){updateModalInPlace();}
function pickColor(assetId,hex,name,type){
  selectedColor={hex,name};
  if(type==="car")GS.carColors={...GS.carColors,[assetId]:hex};
  else GS.watchColors={...GS.watchColors,[assetId]:hex};
  renderModal();
}

// INTRO + INIT
// ═══════════════════════════════════════════════════════════════
let selectedCapital = 100000;

function selectCap(el, val){
  selectedCapital = val;
  document.querySelectorAll('.cap-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('custom-capital').value = '';
}
function onCustomCapInput(val){
  if(val >= 1000){
    selectedCapital = val;
    document.querySelectorAll('.cap-btn').forEach(b=>b.classList.remove('selected'));
  }
}

function startGame(){
  const cap = selectedCapital || 500000;
  // init game state with chosen capital
  const {prices:initP2, history:initH2} = initPrices();
  GS = {
    cash: cap,
    startCash: cap,
    portfolio:{}, upgrades:{},
    prices:{...initP2}, history:{...initH2},
    date: new Date(2020,0,1),
    newsFeed:[{time:"01. Jan 2020",text:`Willkommen bei <b>APEX CAPITAL</b>. Du startest mit ${fmt(cap)} Kapital.`}],
    carColors:{}, watchColors:{},
  };
  const overlay = document.getElementById('intro-overlay');
  overlay.classList.add('fade-out');
  setTimeout(()=>{
    overlay.style.display='none';
    document.getElementById('app').style.display='flex';
    updateHeader();
    updateTicker();
    render();
    startTick();
  }, 700);
}

// no particles

let tickInterval = null;
function startTick(){
  if(tickInterval) clearInterval(tickInterval);
  tickInterval = setInterval(()=>{
    const newDate=new Date(GS.date.getTime()+(3+Math.random()*3)*86400000);
    ALL_ASSETS.forEach(a=>{
      let drift=0.0003;
      if(a.cat==="tech")drift=0.0006;
      if(a.cat==="crypto")drift=0.0012;
      const shock=(Math.random()-0.482)*a.vol;
      const newP=Math.max(GS.prices[a.id]*(1+drift+shock),a.price*0.1);
      GS.prices[a.id]=newP;
      const hist=[...(GS.history[a.id]||[a.price]),newP];
      GS.history[a.id]=hist.slice(-200);
      if(Math.random()<0.018){
        const msgs=[
          `<b>${a.name}</b> ${shock>0?"springt":"fällt"} ${Math.abs(shock*100).toFixed(1)}% nach ${shock>0?"positiven Quartalszahlen":"enttäuschenden Ergebnissen"}.`,
          `Analysten ${shock>0?"erhöhen":"senken"} Kursziel für <b>${a.ticker}</b> signifikant.`,
          `${shock>0?"▲":"▼"} <b>${a.name}</b>: Institutionelle Investoren ${shock>0?"kaufen massiv zu":"reduzieren Position"}.`,
        ];
        GS.newsFeed.unshift({time:fmtDate(newDate),text:msgs[Math.floor(Math.random()*msgs.length)]});
        if(GS.newsFeed.length>60)GS.newsFeed.pop();
      }
    });
    GS.date=newDate;
    updateHeader();
    updateTicker();
    tickUpdatePrices(); // fast in-place DOM update instead of full re-render
    if(currentModal)updateModalInPlace();
  },2800);
}

// ── Fast tick update: only rewrite price/change text nodes in the visible grid ──
function tickUpdatePrices(){
  // Only panels with live price cards benefit; news/upgrades don't need it
  if(['news','upgrades'].includes(currentPanel)) return;
  // If dashboard, just re-render it (it's a table, not many nodes)
  if(currentPanel==='dashboard'){ render(); return; }
  // For grid panels: update .card-price and .card-chg spans in place
  const cards = document.querySelectorAll('.asset-card');
  if(!cards.length){ render(); return; }
  cards.forEach(card=>{
    const onclick = card.getAttribute('onclick')||'';
    const m = onclick.match(/openModal\('([^']+)','([^']+)'\)/);
    if(!m) return;
    const [,id,type] = m;
    const price = GS.prices[id];
    if(price===undefined) return;
    const chg = getChange(id);
    const up = chg>=0;
    const priceEl = card.querySelector('.card-price');
    if(priceEl) priceEl.textContent = fmt(price);
    const chgEl = card.querySelector('.card-chg');
    if(chgEl){
      chgEl.textContent = (up?'▲':'▼')+' '+Math.abs(chg).toFixed(2)+'%';
      chgEl.className = 'card-chg '+(up?'up':'dn');
    }
    // update sparkline
    const hist = GS.history[id]||[];
    const sparkWrap = card.querySelector('.card-bottom');
    if(sparkWrap){
      const oldSvg = sparkWrap.querySelector('svg');
      if(oldSvg){
        const newSvg = sparklineSVG(hist.slice(-20),up?'var(--green)':'var(--red)',60,22);
        const tmp = document.createElement('div');
        tmp.innerHTML = newSvg;
        if(tmp.firstChild) oldSvg.replaceWith(tmp.firstChild);
      }
    }
  });
}
